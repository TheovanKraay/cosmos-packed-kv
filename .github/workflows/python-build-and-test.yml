name: Python Build and Test

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run unit tests
        run: pytest tests/unit/ -v

  integration-tests:
    name: Integration Tests (Cosmos DB Emulator)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start Azure Cosmos DB Emulator
        shell: pwsh
        run: |
          Write-Host "Starting Azure Cosmos DB Emulator..."
          Import-Module "$env:ProgramFiles\Azure Cosmos DB Emulator\PSModules\Microsoft.Azure.CosmosDB.Emulator"
          Start-CosmosDbEmulator -NoUI

      - name: Create test database and container
        shell: pwsh
        run: |
          $emulatorKey = "C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
          $endpoint = "https://127.0.0.1:8081"

          $authKey = [System.Convert]::FromBase64String($emulatorKey)
          $hmacSha = New-Object System.Security.Cryptography.HMACSHA256
          $hmacSha.Key = $authKey

          function Get-CosmosAuthHeader($verb, $resourceType, $resourceId, $date) {
              $payload = "$($verb.ToLower())`n$($resourceType.ToLower())`n$($resourceId.ToLower())`n$($date.ToLower())`n`n"
              $hashPayload = $hmacSha.ComputeHash([System.Text.Encoding]::UTF8.GetBytes($payload))
              $signature = [System.Convert]::ToBase64String($hashPayload)
              $keyType = "master"
              $tokenVersion = "1.0"
              [System.Web.HttpUtility]::UrlEncode("type=$keyType&ver=$tokenVersion&sig=$signature")
          }

          $date = [DateTime]::UtcNow.ToString("r")

          # Create database
          $dbAuth = Get-CosmosAuthHeader "post" "dbs" "" $date
          $headers = @{
              "Authorization" = $dbAuth
              "x-ms-version" = "2018-12-31"
              "x-ms-date" = $date
              "Content-Type" = "application/json"
          }
          $dbBody = '{"id": "testdb"}'
          try {
              Invoke-RestMethod -Uri "$endpoint/dbs" -Method Post -Headers $headers -Body $dbBody -SkipCertificateCheck
              Write-Host "Database 'testdb' created."
          } catch {
              if ($_.Exception.Response.StatusCode -eq 409) {
                  Write-Host "Database 'testdb' already exists."
              } else {
                  Write-Host "Error creating database: $_"
              }
          }

          # Create container with /pk partition key
          $date = [DateTime]::UtcNow.ToString("r")
          $collAuth = Get-CosmosAuthHeader "post" "colls" "dbs/testdb" $date
          $headers = @{
              "Authorization" = $collAuth
              "x-ms-version" = "2018-12-31"
              "x-ms-date" = $date
              "Content-Type" = "application/json"
          }
          $containerBody = '{"id": "testcontainer", "partitionKey": {"paths": ["/pk"], "kind": "Hash"}}'
          try {
              Invoke-RestMethod -Uri "$endpoint/dbs/testdb/colls" -Method Post -Headers $headers -Body $containerBody -SkipCertificateCheck
              Write-Host "Container 'testcontainer' created."
          } catch {
              if ($_.Exception.Response.StatusCode -eq 409) {
                  Write-Host "Container 'testcontainer' already exists."
              } else {
                  Write-Host "Error creating container: $_"
              }
          }

      - name: Run integration tests
        shell: pwsh
        env:
          COSMOS_CONNECTION_STRING: "AccountEndpoint=https://127.0.0.1:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
          COSMOS_DATABASE: "testdb"
          COSMOS_CONTAINER: "testcontainer"
          # Disable SSL verification for the emulator's self-signed cert
          AZURE_COSMOS_EMULATOR: "true"
        run: |
          # The Azure Cosmos DB Emulator uses a self-signed certificate.
          # Disable SSL verification for Python's requests/urllib3.
          $env:CURL_CA_BUNDLE = ""
          $env:REQUESTS_CA_BUNDLE = ""
          $env:SSL_CERT_FILE = ""
          $env:COSMOS_DISABLE_NON_STREAMING_ORDER_BY = "True"
          pytest tests/integration/ -v --timeout=120 -x

  check:
    name: Build Check
    if: always()
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - name: Fail if tests failed
        if: contains(join(needs.*.result, ','), 'failure')
        run: exit 1

      - name: Fail if tests cancelled
        if: contains(join(needs.*.result, ','), 'cancelled')
        run: exit 1

      - name: All checks passed
        run: echo "All checks passed!"
